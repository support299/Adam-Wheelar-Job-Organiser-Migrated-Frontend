server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Django static & media
    location /static/ {
        alias /home/ubuntu/backend/Adam-Wheelar-Job-Organiser-Migrated-Backend/staticfiles/;
    }

    location /media/ {
        alias /home/ubuntu/backend/Adam-Wheelar-Job-Organiser-Migrated-Backend/media/;
    }

    # Django backend — API and admin
    location /api/ {
        include proxy_params;
        proxy_pass http://unix:/home/ubuntu/backend/Adam-Wheelar-Job-Organiser-Migrated-Backend/gunicorn.sock;
    }

    location /admin/ {
        include proxy_params;
        proxy_pass http://unix:/home/ubuntu/backend/Adam-Wheelar-Job-Organiser-Migrated-Backend/gunicorn.sock;
    }

    # React SPA — serve index.html for all other routes
    root /var/www/rdp-frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
